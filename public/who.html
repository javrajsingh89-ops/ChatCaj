<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Javraj</title>

<!-- Font diversi -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Audiowide&family=Bebas+Neue&family=Exo+2:wght@700&family=Sora:wght@700&family=Outfit:wght@700&family=Space+Grotesk:wght@700&family=Rajdhani:wght@700&family=Oxanium:wght@700&family=Chakra+Petch:wght@700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    font-family:Arial,sans-serif;
}

/* ===== GRIGLIA ===== */
.grid{
    position:absolute;
    inset:0;
    background:
        linear-gradient(rgba(0,170,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,170,255,0.03) 1px, transparent 1px);
    background-size:50px 50px;
    z-index:0;
}

/* ===== PARTICELLE ===== */
#particles{
    position:absolute;
    inset:0;
    z-index:1;
}

/* ===== MACCHIE BLU ===== */
.bg{
    position:absolute;
    inset:0;
    overflow:hidden;
}

.blob{
    position:absolute;
    border-radius:50%;
    filter:blur(70px);
}

.blob1{
    width:180px;
    height:180px;
    top:15%;
    left:20%;
    background:radial-gradient(circle,
        rgba(0,170,255,.8),
        rgba(0,170,255,.25),
        transparent);
    animation:float1 8s ease-in-out infinite,
              pulseGlow 5s ease-in-out infinite;
}

.blob2{
    width:220px;
    height:220px;
    bottom:15%;
    right:20%;
    background:radial-gradient(circle,
        rgba(0,120,255,.8),
        rgba(0,120,255,.25),
        transparent);
    animation:float2 10s ease-in-out infinite,
              pulseGlow 6s ease-in-out infinite;
}

@keyframes pulseGlow{
    0%,100%{
        opacity:.7;
        transform:scale(1);
    }
    50%{
        opacity:1;
        transform:scale(1.15);
    }
}

@keyframes float1{
    0%,100%{transform:translate(0,0);}
    50%{transform:translate(40px,-25px);}
}

@keyframes float2{
    0%,100%{transform:translate(0,0);}
    50%{transform:translate(-45px,25px);}
}

/* ===== CONTENITORE ===== */
.container{
    position:relative;
    z-index:10;
    text-align:center;
    transition:transform .12s ease-out;
    transform-style:preserve-3d;
    width:100%;
    padding:0 15px;
}

/* ===== TITOLO ===== */
.main-title{
    font-size:56px;
    font-weight:700;
    line-height:1.1;
    white-space:nowrap; /* sempre una riga */
}

.main-title span{
    display:inline-block;
    text-shadow:
        0 0 8px currentColor,
        0 0 18px rgba(0,170,255,.15);
}

/* ===== COLORI ===== */
.c1{color:#66d9ff;}
.c2{color:#52d1ff;}
.c3{color:#3cc8ff;}
.c4{color:#28bfff;}
.c5{color:#14b5ff;}
.c6{color:#00aaff;}

/* ===== FONT ===== */
.f1{font-family:'Orbitron',sans-serif;}
.f2{font-family:'Audiowide',cursive;}
.f3{font-family:'Bebas Neue',sans-serif;}
.f4{font-family:'Exo 2',sans-serif;}
.f5{font-family:'Sora',sans-serif;}
.f6{font-family:'Outfit',sans-serif;}
.f7{font-family:'Space Grotesk',sans-serif;}
.f8{font-family:'Rajdhani',sans-serif;}
.f9{font-family:'Oxanium',sans-serif;}
.f10{font-family:'Chakra Petch',sans-serif;}

/* ===== LINEA ===== */
.line{
    width:220px;
    height:3px;
    margin:20px auto;
    overflow:hidden;
    background:rgba(255,255,255,.05);
    border-radius:999px;
    position:relative;
}

.line::before{
    content:"";
    position:absolute;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(
        90deg,
        transparent,
        #00aaff,
        transparent
    );
    animation:lineMove 3s linear infinite;
}

@keyframes lineMove{
    100%{
        left:100%;
    }
}

.subtitle{
    color:#8fd8ff;
    font-size:22px;
    font-family:'Space Grotesk',sans-serif;
    opacity:.85;
}

/* ===== TELEFONO ===== */
@media (max-width:768px){

    .main-title{
        font-size:28px; /* abbastanza piccolo da stare in una riga */
        white-space:nowrap;
    }

    .subtitle{
        font-size:16px;
    }

    .line{
        width:160px;
    }

    .blob1{
        width:130px;
        height:130px;
    }

    .blob2{
        width:150px;
        height:150px;
    }
}
</style>
</head>
<body>

<div class="grid"></div>

<canvas id="particles"></canvas>

<div class="bg">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
</div>

<div class="container" id="container">

    <div class="main-title">
        <span class="c1 f1">C</span>
        <span class="c2 f2">i</span>
        <span class="c3 f3">a</span>
        <span class="c4 f4">o</span>
        <span>&nbsp;</span>
        <span class="c5 f5">s</span>
        <span class="c6 f6">o</span>
        <span class="c1 f7">n</span>
        <span class="c2 f8">o</span>
        <span>&nbsp;</span>
        <span class="c3 f9">J</span>
        <span class="c4 f10">a</span>
        <span class="c5 f1">v</span>
        <span class="c6 f2">r</span>
        <span class="c1 f3">a</span>
        <span class="c2 f4">j</span>
    </div>

    <div class="line"></div>

    <div class="subtitle">
        Ho creato io questo sito
    </div>

</div>

<script>
// ===== EFFETTO 3D =====
const container = document.getElementById("container");

document.addEventListener("mousemove",(e)=>{
    const x = (e.clientX - window.innerWidth/2) / 60;
    const y = (e.clientY - window.innerHeight/2) / 60;

    container.style.transform =
        `rotateY(${x/3}deg) rotateX(${-y/3}deg) translate(${x}px,${y}px)`;
});

// ===== PARTICELLE =====
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();

const particles=[];

for(let i=0;i<70;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*2+1,
        speed:Math.random()*0.4+0.1
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle="rgba(0,170,255,0.5)";
        ctx.fill();

        p.y -= p.speed;

        if(p.y < -10){
            p.y = canvas.height + 10;
            p.x = Math.random()*canvas.width;
        }
    });

    requestAnimationFrame(animate);
}

animate();
window.addEventListener("resize", resize);
</script>

</body>
</html>
