<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>who</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Inter',sans-serif;
    position:relative;
}

/* Sfondo */
.bg{
    position:absolute;
    inset:0;
    overflow:hidden;
}

/* Macchie blu */
.blob{
    position:absolute;
    border-radius:50%;
    filter:blur(60px);
}

.blob1{
    width:180px;
    height:180px;
    top:15%;
    left:20%;
    background:radial-gradient(
        circle,
        rgba(0,170,255,0.9) 0%,
        rgba(0,170,255,0.35) 50%,
        transparent 100%
    );
    animation:float1 8s ease-in-out infinite;
}

.blob2{
    width:220px;
    height:220px;
    bottom:15%;
    right:20%;
    background:radial-gradient(
        circle,
        rgba(0,120,255,0.9) 0%,
        rgba(0,120,255,0.35) 50%,
        transparent 100%
    );
    animation:float2 10s ease-in-out infinite;
}

@keyframes float1{
    0%,100%{
        transform:translate(0,0);
    }
    50%{
        transform:translate(40px,-25px);
    }
}

@keyframes float2{
    0%,100%{
        transform:translate(0,0);
    }
    50%{
        transform:translate(-50px,30px);
    }
}

/* Contenitore testo */
.text{
    position:relative;
    z-index:10;
    text-align:center;
}

/* Titolo */
.main-title{
    display:inline-block;
    color:#00aaff;
    font-size:90px;
    font-weight:800;

    text-shadow:
        0 0 10px rgba(0,170,255,.7),
        0 0 25px rgba(0,120,255,.5);

    animation:stretchText 6s ease-in-out infinite;
}

/* Animazione lettere */
@keyframes stretchText{
    0%{
        letter-spacing:0px;
    }

    25%{
        letter-spacing:6px;
    }

    50%{
        letter-spacing:16px;
    }

    75%{
        letter-spacing:6px;
    }

    100%{
        letter-spacing:0px;
    }
}

/* Sottotitolo */
.subtitle{
    margin-top:20px;
    font-size:28px;
    font-weight:600;
    color:#8fd8ff;
    opacity:0.9;
}

/* Entrata iniziale */
.fade{
    animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>
<body>

<div class="bg">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
</div>

<div class="text fade">
    <div class="main-title">
        Ciao sono Javraj
    </div>

    <div class="subtitle">
        Ho creato io questo sito.
    </div>
</div>

</body>
</html>
